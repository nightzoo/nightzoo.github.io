const CAT_COLOR={"신규 모델·제품 출시": "#2D6CDF", "연구·논문 동향": "#7C3AED", "업계·투자 뉴스": "#34d399", "실무 팁·도구": "#fbbf24"};
const fmt=n=>n>=10000?(n/10000).toFixed(1).replace(/\.0$/,'')+'만':n.toLocaleString();
const initials=s=>s.replace(/[@]/g,'').slice(0,2).toUpperCase();
const totViews=DATA.reduce((a,d)=>a+d.views,0),totLikes=DATA.reduce((a,d)=>a+d.likes,0);
const cats=[...new Set(DATA.map(d=>d.cat))];
const statDefs=[{lbl:"수집 게시물",val:DATA.length+"건",sub:"X 인기 탭 기준"},{lbl:"총 조회수",val:fmt(totViews),sub:"합산 노출"},{lbl:"총 좋아요",val:fmt(totLikes),sub:"합산 반응"},{lbl:"카테고리",val:cats.length+"개",sub:"주제 분류"}];
document.getElementById('stats').innerHTML=statDefs.map(s=>`<div class="stat"><div class="lbl">${s.lbl}</div><div class="val">${s.val}</div><div class="sub">${s.sub}</div></div>`).join('');
let active="전체";const chipsEl=document.getElementById('chips');
function renderChips(){chipsEl.innerHTML=["전체",...cats].map(c=>`<div class="chip ${c===active?'active':''}" data-c="${c}">${c}${c==="전체"?` (${DATA.length})`:` (${DATA.filter(d=>d.cat===c).length})`}</div>`).join('');chipsEl.querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{active=ch.dataset.c;renderChips();renderCards();});}
function renderCards(){const list=active==="전체"?DATA:DATA.filter(d=>d.cat===active);document.getElementById('cards').innerHTML=list.map(d=>{const col=CAT_COLOR[d.cat]||"#2D6CDF";return `<div class="tw"><div class="row1"><div class="who"><div class="av" style="background:${col}">${initials(d.handle)}</div><div><div class="nm">${d.author}</div><div class="hd">${d.handle} · ${d.date}</div></div></div><div class="tag" style="background:${col}22;color:${col}">${d.cat}</div></div><div class="sum">${d.summary}</div><div class="foot"><div class="eng"><span>👁 ${d.views?fmt(d.views):'—'}</span><span>❤ ${d.likes?fmt(d.likes):'—'}</span></div><a class="open" href="${d.url}" target="_blank" rel="noopener">트윗 열기 →</a></div></div>`;}).join('');}
renderChips();renderCards();
const gridc='#2a3654',tickc='#93a0bd';
